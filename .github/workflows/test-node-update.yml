name: Test Node.js Compatibility

on:
  workflow_dispatch:
    inputs:
      node-version:
        description: 'Node.js version to test'
        required: false
        default: '24'
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'node-update/**'
      - 'upgrade/**'

jobs:
  test:
    name: Test (Node 24)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ github.event.inputs.node-version || '24' }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        env:
          CI: true
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Install Firebase Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Run functions linter
        working-directory: functions
        run: npm run lint

      - name: Check functions load
        working-directory: functions
        run: node --check index.js

      - name: Run compatibility check
        run: node scripts/test-node-compatibility.js

      - name: Build React app
        env:
          CI: false
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: build/
          retention-days: 1

      - name: Summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi
          echo "## Integration Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| React App Build | $ICON |" >> $GITHUB_STEP_SUMMARY
          echo "| Firebase Functions | $ICON |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js Compatibility | $ICON |" >> $GITHUB_STEP_SUMMARY
